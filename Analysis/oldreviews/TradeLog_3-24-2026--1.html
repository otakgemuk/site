<title>Trade Card Editor — Al Brooks Style</title>
<style>
  :root{
  --dark:#0E0A04;--dark2:#16100A;--dark3:#1E1508;--dark4:#2C2010;
  --gold:#B87333;--gold-lt:#E8C46A;--gold-dim:#6B4420;
  --cream:#F5EDD8;--cream2:#EDE0C4;--muted:#8C7355;--muted2:#5C4A35;
  --green:#4A8A65;--red:#B04030;--blue:#6B8EC4;--orange:#C8854A;
  --font-display:'EB Garamond',Georgia,serif;
  --font-body:'Libre Baskerville',Georgia,serif;
  --font-mono:'DM Mono','Courier New',monospace;
}

  body { background: var(--dark); color: var(--cream); font-family: 'DM Sans', sans-serif; padding: 40px; }
  
  /* Toolbar */
  .toolbar {
    position: fixed; top: 20px; right: 20px; background: var(--surface);
    padding: 15px; border: 1px solid var(--dark4); border-radius: 8px; z-index: 100;
  }

  /* Trade Card Styling */
  .trade-card {
    background: var(--surface); border: 1px solid var(--dark4);
    max-width: 800px; margin: 0 auto 40px; border-radius: 4px; padding: 30px;
  }

  /* Header Section */
  .card-top { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; }
  .id-input { background: var(--red); color: white; border: none; font-family: 'Space Mono'; padding: 5px 10px; width: 60px; font-weight: bold; }
  
  .side-select { 
    background: #1e222d; color: var(--cream); border: 1px solid var(--dark4);
    padding: 5px; font-family: 'Space Mono'; cursor: pointer;
  }

  /* Metrics Row */
  .metrics-row {
    display: grid; grid-template-columns: repeat(3, 1fr);
    border-top: 1px solid var(--dark4); border-bottom: 1px solid var(--dark4);
    margin: 20px 0; padding: 15px 0;
  }
  .metric-box { text-align: center; }
  .metric-label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
  .metric-input { background: transparent; border: none; color: var(--gold); font-family: 'Space Mono'; font-size: 18px; width: 100%; text-align: center; }

  /* Data Table */
  .data-grid { display: grid; grid-template-columns: 150px 1fr; gap: 10px; margin-bottom: 25px; }
  .data-label { color: var(--muted); font-size: 12px; text-transform: uppercase; align-self: center; }
  .data-field { background: #181c22; border: 1px solid var(--dark4); color: var(--cream); padding: 8px; border-radius: 3px; }

  /* Context Area */
  .context-label { color: var(--gold); font-family: var(--font-display); font-size: 20px; letter-spacing: 1px; margin-bottom: 10px; display: block; }
  .context-input { background: transparent; border: 1px solid var(--dark4); color: var(--cream); width: 100%; min-height: 80px; padding: 10px; resize: vertical; }

  .btn { cursor: pointer; padding: 10px 20px; font-weight: bold; border-radius: 4px; border: none; }
  .btn-save { background: var(--green); color: white; }
  .btn-add { background: var(--gold); color: black; margin-right: 10px; }
</style>
</head>

<script>
    function addCard() {
        const container = document.getElementById('log-container');
        const firstCard = document.querySelector('.trade-card');
        const newCard = firstCard.cloneNode(true);
        
        // Reset inputs in the new card
        newCard.querySelectorAll('input, textarea').forEach(input => {
            if(!input.classList.contains('id-input')) input.value = "";
        });
        
        container.appendChild(newCard);
    }

    function saveData() {
        // Convert input values to fixed text for the download version
        document.querySelectorAll('input, textarea').forEach(el => {
            el.setAttribute('value', el.value);
            if(el.tagName === 'TEXTAREA') el.innerHTML = el.value;
        });

        const html = document.documentElement.outerHTML;
        const blob = new Blob([html], {type: 'text/html'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `TradeLog_${new Date().toLocaleDateString().replace(/\//g,'-')}.html`;
        a.click();
    }
</script>
