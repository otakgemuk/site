<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Mono:wght@300;400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EOD Review — Sire Mammat</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --dark:#0E0A04;--dark2:#16100A;--dark3:#1E1508;--dark4:#2C2010;
  --gold:#B87333;--gold-lt:#E8C46A;--gold-dim:#6B4420;
  --cream:#F5EDD8;--cream2:#EDE0C4;--muted:#8C7355;--muted2:#5C4A35;
  --green:#4A8A65;--red:#B04030;--blue:#6B8EC4;--orange:#C8854A;
  --font-display:'EB Garamond',Georgia,serif;
  --font-body:'Libre Baskerville',Georgia,serif;
  --font-mono:'DM Mono','Courier New',monospace;
}
html{scroll-behavior:smooth;}
body{background:var(--dark);color:var(--cream);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:100;background:rgba(7,9,12,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--dark4);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:52px;}
.topbar-logo{font-family:var(--font-display);font-size:20px;letter-spacing:.1em;color:var(--green);text-decoration:none;}
.topbar-back{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.08em;color:var(--text3);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color .15s;}
.topbar-back:hover{color:var(--cream);}

/* ── LOAD BANNER ── */
.load-banner{background:var(--gold-dim);border-bottom:1px solid rgba(245,200,66,.15);padding:10px 32px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.load-banner p{font-family:'Space Mono',monospace;font-size:10px;color:#b8a060;letter-spacing:.04em;}
.load-btn{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:5px 14px;border:1px solid rgba(245,200,66,.4);border-radius:4px;background:var(--gold-dim);color:var(--gold);cursor:pointer;transition:all .15s;white-space:nowrap;}
.load-btn:hover{background:rgba(245,200,66,.15);}
.load-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);}
.load-dot.live{background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* ── MAIN ── */
.page{max-width:1100px;margin:0 auto;padding:48px 32px 80px;}

/* ── PAGE HEADER ── */
.page-header{margin-bottom:40px;}
.ph-
nav{position:fixed;top:0;left:0;right:0;z-index:500;background:rgba(14,10,4,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--dark4);height:64px;display:flex;align-items:center;padding:0 3rem;justify-content:space-between;}
.nav-back{font-family:var(--font-mono);font-size:0.65rem;color:var(--muted);text-decoration:none;letter-spacing:2px;text-transform:uppercase;transition:color 0.2s;white-space:nowrap;}
.nav-back:hover{color:var(--gold-lt);}
.nav-brand{display:flex;align-items:center;gap:12px;text-decoration:none;}
.nav-brand-name{font-family:var(--font-display);font-size:1.3rem;font-weight:600;color:var(--cream);letter-spacing:0.02em;}
.nav-brand-sub{font-family:var(--font-mono);font-size:0.55rem;color:var(--gold);letter-spacing:0.12em;text-transform:uppercase;}
.nav-tag{font-family:var(--font-mono);font-size:0.6rem;background:rgba(184,115,51,0.1);color:var(--gold);border:1px solid rgba(184,115,51,0.25);border-radius:4px;padding:0.25rem 0.7rem;letter-spacing:1px;}
.ph-nav a{color:var(--text3);text-decoration:none;transition:color .15s;}
.ph-nav a:hover{color:var(--cream);}
.ph-label{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;}
.ph-title{font-family:var(--font-display);font-size:clamp(28px,5vw,52px);letter-spacing:.04em;line-height:1.1;margin-bottom:12px;}
.ph-meta{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.ph-badge{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.08em;padding:3px 10px;border-radius:3px;border:1px solid;}
.ph-badge.win{background:var(--green-dim);color:var(--green);border-color:rgba(34,200,122,.3);}
.ph-badge.loss{background:var(--red-dim);color:var(--red);border-color:rgba(232,57,74,.3);}
.ph-badge.be{background:var(--gold-dim);color:var(--gold);border-color:rgba(245,200,66,.3);}
.ph-badge.neutral{background:var(--surface2);color:var(--text2);border-color:rgba(184,115,51,0.2);}
.ph-pts{font-family:var(--font-display);font-size:22px;letter-spacing:.03em;}
.ph-pts.win{color:var(--green);}
.ph-pts.loss{color:var(--red);}
.ph-pts.be{color:var(--gold);}

/* ── SECTION LABEL ── */
.sec-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.sec-label::after{content:'';flex:1;height:1px;background:var(--dark4);}

/* ── SUMMARY STRIP ── */
.summary-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:1px;background:var(--dark4);border:1px solid var(--dark4);border-radius:8px;overflow:hidden;margin-bottom:36px;}
.ss-cell{background:var(--surface);padding:18px 20px;text-align:center;}
.ss-cell-label{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
.ss-cell-value{font-family:var(--font-display);font-size:28px;letter-spacing:.03em;line-height:1;}
.ss-cell-value.pos{color:var(--green);}
.ss-cell-value.neg{color:var(--red);}
.ss-cell-value.gold{color:var(--gold);}
.ss-cell-sub{font-family:'Space Mono',monospace;font-size:8px;color:var(--text3);margin-top:4px;}

/* ── CONTEXT BLOCK ── */
.ctx-block{background:var(--surface);border:1px solid var(--dark4);border-radius:8px;overflow:hidden;margin-bottom:36px;}
.ctx-header{padding:12px 20px;border-bottom:1px solid var(--dark4);display:flex;align-items:center;gap:8px;background:var(--surface2);}
.ctx-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);box-shadow:0 0 6px var(--gold);}
.ctx-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;}
.ctx-body{display:grid;grid-template-columns:1fr 1fr;}
.ctx-chart{background:#060809;border-right:1px solid var(--dark4);min-height:220px;display:flex;align-items:center;justify-content:center;}
.ctx-chart img{width:100%;height:100%;object-fit:cover;display:block;opacity:.9;}
.ctx-no-chart{font-family:'Space Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.1em;}
.ctx-narrative{padding:20px 24px;display:flex;flex-direction:column;gap:12px;}
.ctx-nar-title{font-family:var(--font-display);font-size:18px;letter-spacing:.04em;color:var(--cream);}
.bias-row{display:flex;gap:6px;flex-wrap:wrap;}
.bias-chip{font-family:'Space Mono',monospace;font-size:8px;padding:3px 8px;border-radius:3px;border:1px solid;}
.bias-chip.bearish{background:var(--red-dim);color:var(--red);border-color:rgba(232,57,74,.3);}
.bias-chip.bullish{background:var(--green-dim);color:var(--green);border-color:rgba(34,200,122,.3);}
.bias-chip.range{background:var(--gold-dim);color:var(--gold);border-color:rgba(245,200,66,.3);}
.bias-chip.neutral{background:var(--blue-dim);color:var(--blue);border-color:rgba(59,130,246,.3);}
.ctx-text{font-size:12px;line-height:1.75;color:var(--text2);}
.key-levels{background:var(--surface2);border:1px solid var(--dark4);border-radius:5px;padding:10px 14px;display:flex;flex-direction:column;gap:5px;}
.kl-row{display:flex;justify-content:space-between;align-items:center;}
.kl-key{font-family:'Space Mono',monospace;font-size:9px;color:var(--text3);text-transform:uppercase;}
.kl-val{font-family:'Space Mono',monospace;font-size:9px;color:var(--cream);}

/* ── TRADE CARDS ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-bottom:36px;}
.trade-card{background:var(--surface);border:1px solid var(--dark4);border-radius:8px;overflow:hidden;position:relative;}
.trade-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.trade-card.long-c::before{background:var(--green);}
.trade-card.short-c::before{background:var(--red);}
.tc-head{padding:16px 18px 12px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid var(--dark4);}
.tc-num{font-family:var(--font-display);font-size:30px;letter-spacing:.05em;line-height:1;}
.tc-num.long{color:var(--green);}
.tc-num.short{color:var(--red);}
.tc-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.tc-dir{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;padding:3px 8px;border-radius:3px;}
.tc-dir.long{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,200,122,.3);}
.tc-dir.short{background:var(--red-dim);color:var(--red);border:1px solid rgba(232,57,74,.3);}
.tc-setup{font-family:'Space Mono',monospace;font-size:8px;color:var(--text3);}
.tc-risk{font-family:'Space Mono',monospace;font-size:7px;padding:2px 6px;border-radius:3px;}
.tc-risk.high{background:var(--red-dim);color:var(--red);border:1px solid rgba(232,57,74,.2);}
.tc-risk.med{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(245,200,66,.2);}
.tc-risk.low{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,200,122,.2);}
.tc-stats{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--dark4);}
.tc-stat{padding:10px 12px;border-right:1px solid var(--dark4);}
.tc-stat:last-child{border-right:none;}
.tc-stat-label{font-family:'Space Mono',monospace;font-size:7px;color:var(--text3);text-transform:uppercase;margin-bottom:3px;}
.tc-stat-val{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;}
.tc-stat-val.pos{color:var(--green);}
.tc-stat-val.neg{color:var(--red);}
.tc-stat-val.gold{color:var(--gold);}
.tc-exec{padding:12px 18px;border-bottom:1px solid var(--dark4);}
.tc-exec-title{font-family:'Space Mono',monospace;font-size:7px;color:var(--text3);text-transform:uppercase;margin-bottom:7px;}
.tc-exec-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;}
.tc-exec-key{color:var(--text3);}
.tc-exec-val{font-family:'Space Mono',monospace;color:var(--cream);font-size:10px;}
.tc-exec-val.pos{color:var(--green);}
.tc-exec-val.neg{color:var(--red);}
.tc-bar{margin:0 18px 10px;height:4px;border-radius:2px;background:var(--surface2);}
.tc-bar-fill{height:100%;border-radius:2px;}
.tc-bar-fill.long{background:linear-gradient(90deg,var(--blue),var(--green));}
.tc-bar-fill.short{background:linear-gradient(90deg,var(--blue),var(--red));}
.tc-note{margin:0 18px 10px;padding:8px 12px;border-radius:4px;border-left:3px solid var(--gold);background:var(--gold-dim);font-size:9px;color:#b8a060;line-height:1.6;font-family:'Space Mono',monospace;}
.tc-rationale{padding:10px 18px 12px;}
.tc-rationale p{font-size:11px;line-height:1.75;color:var(--text2);}
.tc-tags{padding:0 18px 12px;display:flex;flex-wrap:wrap;gap:4px;}
.tc-tag{font-family:'Space Mono',monospace;font-size:7px;padding:2px 6px;border-radius:3px;border:1px solid var(--dark4);color:var(--text3);background:var(--surface2);}
.tc-tag.gold{border-color:rgba(245,200,66,.3);color:var(--gold);background:var(--gold-dim);}

/* ── SESSION TIMELINE ── */
.timeline{display:flex;flex-direction:column;gap:0;margin-bottom:36px;}
.tl-item{display:flex;gap:16px;padding:14px 0;border-bottom:1px solid var(--dark4);}
.tl-item:last-child{border-bottom:none;}
.tl-num{font-family:var(--font-display);font-size:20px;color:var(--text3);line-height:1;min-width:28px;padding-top:2px;}
.tl-text{font-size:13px;color:var(--text2);line-height:1.7;}

/* ── REFLECTION ── */
.reflection-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:36px;}
.refl-block{background:var(--surface);border:1px solid var(--dark4);border-radius:8px;padding:20px 24px;}
.refl-title{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px;}
.refl-title.pos{color:var(--green);}
.refl-title.neg{color:var(--red);}
.refl-list{display:flex;flex-direction:column;gap:8px;}
.refl-item{display:flex;gap:10px;align-items:flex-start;font-size:13px;color:var(--text2);line-height:1.6;}
.refl-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:6px;}
.refl-dot.pos{background:var(--green);}
.refl-dot.neg{background:var(--red);}

/* ── LESSONS ── */
.lessons-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:36px;}
.lesson-card{background:var(--surface);border:1px solid var(--dark4);border-radius:8px;padding:18px 24px;display:flex;gap:20px;align-items:flex-start;}
.lesson-num{font-family:var(--font-display);font-size:28px;color:var(--text3);line-height:1;flex-shrink:0;min-width:32px;}
.lesson-text{font-size:13.5px;color:var(--text2);line-height:1.7;}
.lesson-text strong{color:var(--cream);}

/* ── FOOTER ── */
.page-footer{border-top:1px solid var(--dark4);padding:24px 0 0;display:flex;align-items:center;justify-content:space-between;margin-top:24px;}
.page-footer-copy{font-family:'Space Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.08em;}
.motto{font-family:'Space Mono',monospace;font-size:8px;color:var(--text3);letter-spacing:.12em;}

@media(max-width:768px){
  .ctx-body{grid-template-columns:1fr;}
  .reflection-grid{grid-template-columns:1fr;}
  .cards-grid{grid-template-columns:1fr;}
  .summary-strip{grid-template-columns:repeat(2,1fr);}
  .page{padding:32px 16px 60px;}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a href="index.html" class="topbar-logo">SIREMAMMAT</a>
  <a href="../Performance/index.html" class="topbar-back">← Performance</a>
</div>

<!-- LOAD BANNER -->
<div class="load-banner" id="load-banner">
  <p>📂 LOCAL PREVIEW MODE — Load your <strong>eod-data.js</strong> to view this review</p>
  <div style="display:flex;align-items:center;gap:10px;">
    <div style="display:flex;align-items:center;gap:6px;font-family:'Space Mono',monospace;font-size:10px;color:#b8a060;">
      <div class="load-dot" id="load-dot"></div>
      <span id="load-status-txt">No data</span>
    </div>
    <button class="load-btn" onclick="document.getElementById('data-inp').click()">Load eod-data.js</button>
    <input type="file" id="data-inp" accept=".js" style="display:none" onchange="loadFile(this)">
  </div>
</div>

<!-- PAGE CONTENT -->
<div class="page" id="page-content">
  <div style="text-align:center;padding:80px 0;">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:.06em;color:var(--text3);">LOAD EOD DATA</div>
    <div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--text3);margin-top:8px;letter-spacing:.04em;">Load eod-data.js via the banner above to view this review</div>
  </div>
</div>

<script>
let allData = [];

/* ── LOAD FILE ── */
function loadFile(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const text = e.target.result;
      const si = text.indexOf('['), ei = text.lastIndexOf(']');
      if (si === -1 || ei <= si) { alert('No data array found.'); return; }
      let parsed;
      try { parsed = (new Function('return ' + text.slice(si, ei+1)))(); }
      catch { parsed = JSON.parse(text.slice(si, ei+1)); }
      allData = Array.isArray(parsed) ? parsed : [];
      document.getElementById('load-dot').classList.add('live');
      document.getElementById('load-status-txt').textContent = allData.length + ' reviews loaded';
      renderReview();
    } catch(err) { alert('Parse error: ' + err.message); }
  };
  reader.readAsText(file);
  input.value = '';
}

/* ── GET ID FROM URL ── */
function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

/* ── RENDER ── */
function renderReview() {
  const idParam = getParam('id');
  // find by id, or fall back to most recent
  let r = idParam
    ? allData.find(x => String(x.id) === String(idParam))
    : allData[0];

  if (!r) {
    document.getElementById('page-content').innerHTML = `<div style="text-align:center;padding:80px 0;"><div style="font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--text3);">REVIEW NOT FOUND</div><div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--text3);margin-top:8px;">This EOD ID was not found in your data file.</div></div>`;
    return;
  }

  const rc      = r.result === 'WIN' ? 'win' : r.result === 'LOSS' ? 'loss' : 'be';
  const ptsNum  = r.pts || 0;
  const ptsStr  = (ptsNum >= 0 ? '+' : '') + ptsNum.toFixed(1);
  const d       = r.date ? new Date(r.date + 'T00:00:00') : null;
  const months  = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const days    = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const dateStr = d ? `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}` : '—';

  document.title = `EOD ${r.eodNum || ''} — ${r.title || 'Review'} — Sire Mammat`;

  // bias chips
  const biasTags  = r.biasTags || [];
  const chipsHTML = biasTags.map(t => {
    const cls = /bear|short|down/i.test(t)?'bearish':/bull|long|up/i.test(t)?'bullish':/range|limit/i.test(t)?'range':'neutral';
    return `<span class="bias-chip ${cls}">${t}</span>`;
  }).join('');

  // key levels
  const klHTML = r.keyLevels
    ? r.keyLevels.split('\n').filter(l=>l.includes('|')).map(l => {
        const [k,v] = l.split('|');
        return `<div class="kl-row"><span class="kl-key">${k.trim()}</span><span class="kl-val">${v.trim()}</span></div>`;
      }).join('')
    : '';

  // chart
  const chartHTML = r.chartDataUrl
    ? `<img src="${r.chartDataUrl}" alt="EOD Chart">`
    : `<div class="ctx-no-chart">NO CHART UPLOADED</div>`;

  // trade cards
  const trades = r.tradeLog || [];
  const cardsHTML = trades.map((t, i) => {
    const isLong = t.direction === 'long';
    const dc     = isLong ? 'long' : 'short';
    const pnlNum = parseFloat(t.pnl) || 0;
    const riskMap = {high:'HIGH RISK',med:'MED RISK',low:'LOW RISK'};
    const tagsHTML = (t.tags||[]).map((tg,ti) => `<span class="tc-tag ${ti<2?'gold':''}">${tg}</span>`).join('');
    const noteHTML = t.note ? `<div class="tc-note">${t.note}</div>` : '';
    const barPct   = Math.min(Math.abs(pnlNum)/800*100, 100);
    return `
    <div class="trade-card ${dc}-c">
      <div class="tc-head">
        <div class="tc-num ${dc}">T${String(i+1).padStart(2,'0')}</div>
        <div class="tc-right">
          <div class="tc-dir ${dc}">${isLong?'LONG ▲':'SHORT ▼'}</div>
          <div class="tc-setup">${t.setup||''}</div>
          <div class="tc-risk ${t.risk||'med'}">${riskMap[t.risk]||''}</div>
        </div>
      </div>
      <div class="tc-stats">
        <div class="tc-stat"><div class="tc-stat-label">P&amp;L</div><div class="tc-stat-val ${pnlNum>=0?'pos':'neg'}">${pnlNum>0?'+':''}${t.pnl||'—'}</div></div>
        <div class="tc-stat"><div class="tc-stat-label">R:R</div><div class="tc-stat-val gold">${t.rr||'—'}</div></div>
        <div class="tc-stat"><div class="tc-stat-label">Result</div><div class="tc-stat-val ${pnlNum>=0?'pos':'neg'}">${pnlNum>=0?'WIN ✓':'LOSS ✗'}</div></div>
      </div>
      <div class="tc-exec">
        <div class="tc-exec-title">Execution</div>
        <div class="tc-exec-row"><span class="tc-exec-key">Order Type</span><span class="tc-exec-val ${isLong?'pos':'neg'}">${t.orderType||'—'}</span></div>
        <div class="tc-exec-row"><span class="tc-exec-key">Entry Trigger</span><span class="tc-exec-val">${t.entry||'—'}</span></div>
        <div class="tc-exec-row"><span class="tc-exec-key">Fill Bar</span><span class="tc-exec-val">${t.fillBar||'—'}</span></div>
        <div class="tc-exec-row"><span class="tc-exec-key">Stop Loss</span><span class="tc-exec-val neg">${t.stop||'—'}</span></div>
        <div class="tc-exec-row"><span class="tc-exec-key">Exit</span><span class="tc-exec-val">${t.exit||'—'}</span></div>
      </div>
      <div class="tc-bar"><div class="tc-bar-fill ${dc}" style="width:${barPct}%"></div></div>
      ${noteHTML}
      ${t.rationale?`<div class="tc-rationale"><p>${t.rationale}</p></div>`:''}
      <div class="tc-tags">${tagsHTML}</div>
    </div>`;
  }).join('');

  // sessions timeline
  const sessions = r.sessions || [];
  const timelineHTML = sessions.length
    ? `<div class="timeline">${sessions.map((s,i)=>`<div class="tl-item"><div class="tl-num">${String(i+1).padStart(2,'0')}</div><div class="tl-text">${s}</div></div>`).join('')}</div>`
    : '';

  // reflection
  const worked  = r.worked  || [];
  const improve = r.improve || [];
  const reflHTML = (worked.length || improve.length) ? `
  <div class="reflection-grid">
    <div class="refl-block">
      <div class="refl-title pos">What Worked</div>
      <div class="refl-list">${worked.map(x=>`<div class="refl-item"><div class="refl-dot pos"></div>${x}</div>`).join('')}</div>
    </div>
    <div class="refl-block">
      <div class="refl-title neg">Areas to Improve</div>
      <div class="refl-list">${improve.map(x=>`<div class="refl-item"><div class="refl-dot neg"></div>${x}</div>`).join('')}</div>
    </div>
  </div>` : '';

  // lessons
  const lessons = r.lessons || [];
  const lessonsHTML = lessons.length
    ? `<div class="lessons-grid">${lessons.map((l,i)=>`<div class="lesson-card"><div class="lesson-num">${String(i+1).padStart(2,'0')}</div><div class="lesson-text">${l}</div></div>`).join('')}</div>`
    : '';

  // trade summary
  const wins    = trades.filter(t=>(parseFloat(t.pnl)||0)>0).length;
  const tradePts = trades.reduce((a,t)=>a+(parseFloat(t.pnl)||0),0);
  const tradeWR  = trades.length ? Math.round(wins/trades.length*100) : 0;

  document.getElementById('page-content').innerHTML = `
    <!-- HEADER -->
    <div class="page-header">
      <div class="ph-nav">
        <a href="../Performance/index.html">Performance</a>
        <span>/</span>
        <span>EOD ${r.eodNum || '—'}</span>
      </div>
      <div class="ph-label">${r.instrument||''} · ${r.day||''} · EOD Review</div>
      <div class="ph-title">${r.title || 'Untitled Session'}</div>
      <div class="ph-meta">
        <span class="ph-badge ${rc}">${r.result}</span>
        <span class="ph-pts ${rc}">${ptsStr} pts</span>
        <span class="ph-badge neutral">${dateStr}</span>
        ${r.instrument?`<span class="ph-badge neutral">${r.instrument}</span>`:''}
        ${(r.tags||[]).map(t=>`<span class="ph-badge neutral">${t}</span>`).join('')}
      </div>
    </div>

    <!-- SUMMARY STRIP -->
    <div class="sec-label">Session Summary</div>
    <div class="summary-strip">
      <div class="ss-cell">
        <div class="ss-cell-label">Net Points</div>
        <div class="ss-cell-value ${rc}">${ptsStr}</div>
        <div class="ss-cell-sub">session total</div>
      </div>
      <div class="ss-cell">
        <div class="ss-cell-label">Trades Taken</div>
        <div class="ss-cell-value">${r.trades || trades.length || '—'}</div>
        <div class="ss-cell-sub">${r.tradesWon || wins} winner${(r.tradesWon||wins)!==1?'s':''}</div>
      </div>
      <div class="ss-cell">
        <div class="ss-cell-label">Trade Win Rate</div>
        <div class="ss-cell-value ${tradeWR>=50?'pos':'neg'}">${trades.length?tradeWR+'%':'—'}</div>
        <div class="ss-cell-sub">${wins} / ${trades.length}</div>
      </div>
      <div class="ss-cell">
        <div class="ss-cell-label">Session Bias</div>
        <div class="ss-cell-value" style="font-size:${(r.sumBias||'').length>8?'14px':'22px'};padding-top:4px">${r.sumBias||'—'}</div>
        <div class="ss-cell-sub">market character</div>
      </div>
    </div>

    <!-- MARKET CONTEXT -->
    ${(r.contextText||biasTags.length||klHTML||r.chartDataUrl)?`
    <div class="sec-label">Market Context</div>
    <div class="ctx-block">
      <div class="ctx-header">
        <div class="ctx-dot"></div>
        <div class="ctx-label">Session Overview — ${r.instrument||'FUTURES'} · RTH · ${dateStr}</div>
      </div>
      <div class="ctx-body">
        <div class="ctx-chart">${chartHTML}</div>
        <div class="ctx-narrative">
          <div class="ctx-nar-title">Market Narrative</div>
          ${biasTags.length?`<div class="bias-row">${chipsHTML}</div>`:''}
          ${r.contextText?`<div class="ctx-text">${r.contextText.replace(/\n/g,'<br>')}</div>`:''}
          ${klHTML?`<div class="key-levels">${klHTML}</div>`:''}
        </div>
      </div>
    </div>`:''}

    <!-- SESSION TIMELINE -->
    ${sessions.length?`<div class="sec-label">Session Timeline</div>${timelineHTML}`:''}

    <!-- TRADE LOG -->
    ${trades.length?`<div class="sec-label">Trade Log</div><div class="cards-grid">${cardsHTML}</div>`:''}

    <!-- REFLECTION -->
    ${(worked.length||improve.length)?`<div class="sec-label">Reflection</div>${reflHTML}`:''}

    <!-- LESSONS -->
    ${lessons.length?`<div class="sec-label">Key Lessons</div>${lessonsHTML}`:''}

    <!-- FOOTER -->
    <div class="page-footer">
      <div class="page-footer-copy">© 2025 SIRE MAMMAT · ALL TRADING INVOLVES RISK</div>
      <div class="motto">${r.motto||'PATIENCE · DISCIPLINE · FEARLESS · EXECUTION'}</div>
    </div>`;
}

// Auto-load if data is already in page (for live site where eod-data.js is a <script src>)
window.addEventListener('DOMContentLoaded', () => {
  if (typeof window.EOD_DATA !== 'undefined' && Array.isArray(window.EOD_DATA)) {
    allData = window.EOD_DATA;
    document.getElementById('load-dot').classList.add('live');
    document.getElementById('load-status-txt').textContent = allData.length + ' reviews (from script)';
    document.getElementById('load-banner').style.display = 'none';
    renderReview();
  }
});
</script>
</body>
</html>
