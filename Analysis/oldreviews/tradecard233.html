<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Mono:wght@300;400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <title>Futures Trade Journal — Al Brooks Style</title>
    <style>
        :root{
  --dark:#0E0A04;--dark2:#16100A;--dark3:#1E1508;--dark4:#2C2010;
  --gold:#B87333;--gold-lt:#E8C46A;--gold-dim:#6B4420;
  --cream:#F5EDD8;--cream2:#EDE0C4;--muted:#8C7355;--muted2:#5C4A35;
  --green:#4A8A65;--red:#B04030;--blue:#6B8EC4;--orange:#C8854A;
  --font-display:'EB Garamond',Georgia,serif;
  --font-body:'Libre Baskerville',Georgia,serif;
  --font-mono:'DM Mono','Courier New',monospace;
}

        body { background: var(--dark); color: var(--cream); font-family: 'DM Sans', sans-serif; padding: 40px; line-height: 1.6; }
        
        /* Toolbar */
        .toolbar {
            position: fixed; top: 20px; right: 20px; background: var(--surface);
            padding: 15px; border: 1px solid var(--dark4); border-radius: 8px; z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; gap: 10px;
        }

        /* Stats Dashboard */
        .stats-dashboard {
            max-width: 900px; margin: 0 auto 30px; 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;
            background: var(--surface); padding: 20px; border: 1px solid var(--gold); border-radius: 4px;
        }
        .stat-item { text-align: center; border-right: 1px solid var(--dark4); }
        .stat-item:last-child { border-right: none; }
        .stat-val { display: block; font-family: 'Space Mono'; font-size: 24px; color: var(--gold); font-weight: bold; }
        .stat-lbl { font-size: 10px; text-transform: uppercase; color: var(--muted); letter-spacing: 1px; }

        /* Trade Card Styling */
        .trade-card {
            background: var(--surface); border: 1px solid var(--dark4);
            max-width: 900px; margin: 0 auto 40px; border-radius: 4px; padding: 30px;
            transition: border-left 0.3s ease; position: relative;
            page-break-inside: avoid; /* Prevents splitting a card across pages */
        }
        
        .trade-card.profit { border-left: 6px solid var(--green); }
        .trade-card.loss { border-left: 6px solid var(--red); }

        .card-top { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; }
        .id-input { background: var(--dark4); color: var(--gold); border: none; font-family: 'Space Mono'; padding: 5px 10px; width: 60px; font-weight: bold; text-align: center; }
        
        .side-select { 
            background: #1e222d; color: var(--cream); border: 1px solid var(--dark4);
            padding: 5px; font-family: 'Space Mono'; cursor: pointer; text-transform: uppercase;
        }

        .metrics-row {
            display: grid; grid-template-columns: repeat(3, 1fr);
            border-top: 1px solid var(--dark4); border-bottom: 1px solid var(--dark4);
            margin: 20px 0; padding: 15px 0;
        }
        .metric-box { text-align: center; }
        .metric-label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
        .metric-input { background: transparent; border: none; color: var(--gold); font-family: 'Space Mono'; font-size: 18px; width: 100%; text-align: center; }

        .data-grid { display: grid; grid-template-columns: 160px 1fr; gap: 12px; margin-bottom: 25px; }
        .data-label { color: var(--muted); font-size: 11px; text-transform: uppercase; align-self: center; }
        .data-field { background: #181c22; border: 1px solid var(--dark4); color: var(--cream); padding: 10px; border-radius: 3px; font-size: 14px; }

        .image-upload-wrapper {
            margin: 20px 0; border: 1px dashed var(--dark4); border-radius: 4px;
            min-height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.02);
        }
        .preview-img { max-width: 100%; border-radius: 2px; margin-top: 10px; border: 1px solid var(--dark4); }
        .upload-btn { background: var(--surface); color: var(--muted); border: 1px solid var(--dark4); padding: 8px 15px; cursor: pointer; font-family: 'Space Mono'; font-size: 11px; }
        .file-input { display: none; }

        .context-label { color: var(--gold); font-family: var(--font-display); font-size: 22px; letter-spacing: 1.5px; margin-bottom: 12px; display: block; }
        .context-input { 
            background: rgba(255,255,255,0.03); border: 1px solid var(--dark4); color: var(--cream); 
            width: 100%; min-height: 120px; padding: 15px; resize: vertical; font-size: 15px; 
            box-sizing: border-box; font-family: 'DM Sans', sans-serif;
        }

        .btn { cursor: pointer; padding: 10px 20px; font-weight: bold; border-radius: 4px; border: none; font-family: 'Space Mono'; }
        .btn-save { background: var(--green); color: white; }
        .btn-add { background: var(--gold); color: black; }
        .btn-remove { background: var(--red); color: white; font-size: 10px; padding: 5px 10px; position: absolute; top: 10px; right: 10px; }

        /* PRINT STYLES */
        @media print {
            body { background: white; color: black; padding: 0; }
            .toolbar, .btn-remove, .upload-btn { display: none !important; }
            .trade-card { border: 1px solid #ccc; background: white; margin: 20px auto; box-shadow: none; }
            .stats-dashboard { border: 1px solid black; background: white; margin-top: 50px; }
            .stat-val, .context-label, .metric-input { color: black !important; }
            .data-field, .context-input { background: #f9f9f9; border: 1px solid #ddd; color: black !important; }
            .id-input { background: #eee; color: black !important; }
        }
    </style>
</head>
<body>

<div class="toolbar">
    <button class="btn btn-add" onclick="addCard()">+ Add Trade</button>
    <button class="btn btn-save" onclick="saveData()">Save Journal</button>
    <button class="btn" style="background: var(--muted); color: white;" onclick="window.print()">Print to PDF</button>
</div>

<div class="stats-dashboard">
    <div class="stat-item"><span id="stat-total-ticks" class="stat-val">0</span><span class="stat-lbl">Net Ticks</span></div>
    <div class="stat-item"><span id="stat-win-rate" class="stat-val">0%</span><span class="stat-lbl">Win Rate</span></div>
    <div class="stat-item"><span id="stat-profit-factor" class="stat-val">0.0</span><span class="stat-lbl">Profit Factor</span></div>
    <div class="stat-item"><span id="stat-trade-count" class="stat-val">0</span><span class="stat-lbl">Total Trades</span></div>
</div>

<div id="log-container">
    <div class="trade-card">
        <button class="btn btn-remove" onclick="this.parentElement.remove(); updateStats();">Remove</button>
        <div class="card-top">
            <input type="text" class="id-input" value="T01">
            <select class="side-select"><option value="long">LONG</option><option value="short">SHORT</option></select>
            <input type="text" class="metric-input setup-name" style="text-align:left; font-size: 24px; color: var(--text);" placeholder="Setup Name">
        </div>
        <div class="metrics-row">
            <div class="metric-box"><span class="metric-label">P & L (Ticks)</span><input type="text" class="metric-input pl-input" value="+0" oninput="updateStats()"></div>
            <div class="metric-box"><span class="metric-label">R:R</span><input type="text" class="metric-input" value="1:1"></div>
            <div class="metric-box"><span class="metric-label">Result</span><input type="text" class="metric-input res-input" value="Profit" oninput="updateStats()"></div>
        </div>
        <div class="data-grid">
            <span class="data-label">Execution</span> <input type="text" class="data-field" placeholder="STOP/LIMIT">
            <span class="data-label">Entry Trigger</span> <input type="text" class="data-field" placeholder="1 tick above Bar X">
            <span class="data-label">Fill Bar</span> <input type="text" class="data-field" placeholder="Bar X">
        </div>
        <div class="image-upload-wrapper">
            <button class="upload-btn" onclick="this.nextElementSibling.click()">+ Upload Chart</button>
            <input type="file" class="file-input" accept="image/*" onchange="previewImage(this)">
            <img src="" class="preview-img" style="display:none;">
        </div>
        <span class="context-label">Context Notes</span>
        <textarea class="context-input" placeholder="Note down Delta, 20EMA, and Brooks patterns..."></textarea>
    </div>
</div>

<script>
    function updateStats() {
        let totalTicks = 0, wins = 0, losses = 0, grossProfit = 0, grossLoss = 0;
        const cards = document.querySelectorAll('.trade-card');

        cards.forEach(card => {
            const plStr = card.querySelector('.pl-input').value.replace(/[^-0-9.]/g, '');
            const resStr = card.querySelector('.res-input').value.toLowerCase();
            const plVal = parseFloat(plStr) || 0;

            totalTicks += plVal;
            if (resStr.includes('profit')) {
                wins++; grossProfit += Math.abs(plVal);
                card.classList.add('profit'); card.classList.remove('loss');
            } else if (resStr.includes('loss')) {
                losses++; grossLoss += Math.abs(plVal);
                card.classList.add('loss'); card.classList.remove('profit');
            }
        });

        document.getElementById('stat-total-ticks').innerText = (totalTicks >= 0 ? '+' : '') + totalTicks;
        document.getElementById('stat-trade-count').innerText = cards.length;
        document.getElementById('stat-win-rate').innerText = cards.length ? Math.round((wins / cards.length) * 100) + '%' : '0%';
        document.getElementById('stat-profit-factor').innerText = grossLoss === 0 ? grossProfit.toFixed(1) : (grossProfit / grossLoss).toFixed(1);
    }

    function addCard() {
        const container = document.getElementById('log-container');
        const cards = document.querySelectorAll('.trade-card');
        const newCard = cards[0].cloneNode(true);
        
        newCard.querySelectorAll('input, textarea').forEach(i => i.value = (i.classList.contains('id-input') ? i.value : ""));
        newCard.querySelector('.preview-img').src = "";
        newCard.querySelector('.preview-img').style.display = "none";
        newCard.querySelector('.upload-btn').style.display = "block";
        
        // Increment ID
        const lastId = cards[cards.length - 1].querySelector('.id-input').value;
        const idNum = parseInt(lastId.replace(/\D/g,'')) || 0;
        newCard.querySelector('.id-input').value = "T" + String(idNum + 1).padStart(2, '0');
        
        container.appendChild(newCard);
        updateStats();
    }

    function previewImage(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onloadend = () => {
            const img = input.nextElementSibling;
            img.src = reader.result; img.style.display = 'block';
            input.previousElementSibling.style.display = 'none';
        };
        if (file) reader.readAsDataURL(file);
    }

    function saveData() {
        document.querySelectorAll('input, textarea').forEach(el => el.setAttribute('value', el.value));
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([document.documentElement.outerHTML], {type: 'text/html'}));
        const date = new Date().toISOString().split('T')[0];
        a.download = `Futures_Journal_${date}.html`;
        a.click();
    }

    window.onload = updateStats;
</script>
</body>
</html>
