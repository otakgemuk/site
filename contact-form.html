<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact SireMammat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: transparent;
    color: #e0e0e0;
    padding: 0;
  }
  .contact-form {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  .form-field { display: flex; flex-direction: column; gap: 0.35rem; }
  .form-field label {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #B87333;
    font-weight: 600;
  }
  .form-field input,
  .form-field select,
  .form-field textarea {
    padding: 0.7rem 0.9rem;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(184,115,51,0.25);
    border-radius: 8px;
    color: #e0e0e0;
    font-size: 0.95rem;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  .form-field input:focus,
  .form-field select:focus,
  .form-field textarea:focus {
    outline: none;
    border-color: #B87333;
    box-shadow: 0 0 0 3px rgba(184,115,51,0.15);
  }
  .form-field input::placeholder,
  .form-field textarea::placeholder { color: rgba(255,255,255,0.3); }
  .form-field select option { background: #1a1a2e; color: #e0e0e0; }
  .form-field textarea { min-height: 120px; resize: vertical; }
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.75rem 1.6rem;
    background: #B87333;
    color: #0d0d1a;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    align-self: flex-start;
  }
  .btn-primary:hover { background: #d4944a; }
  .btn-primary:active { transform: scale(0.97); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
  .success-msg {
    display: none;
    padding: 0.8rem 1rem;
    background: rgba(76,175,80,0.15);
    border: 1px solid rgba(76,175,80,0.3);
    border-radius: 8px;
    color: #81c784;
    font-size: 0.9rem;
  }
  .error-msg {
    display: none;
    padding: 0.8rem 1rem;
    background: rgba(244,67,54,0.15);
    border: 1px solid rgba(244,67,54,0.3);
    border-radius: 8px;
    color: #ef9a9a;
    font-size: 0.9rem;
  }
  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<form class="contact-form" action="https://formspree.io/f/xjglbqkz" method="POST">
  <div class="form-row">
    <div class="form-field">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Your name" required>
    </div>
    <div class="form-field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="your@email.com" required>
    </div>
  </div>
  <div class="form-field">
    <label for="enquiry-type">Type of Enquiry</label>
    <select id="enquiry-type" name="enquiry-type">
      <option value="">Select…</option>
      <option value="General question">General question</option>
      <option value="Mentoring / coaching">Mentoring / coaching</option>
      <option value="Content collaboration">Content collaboration</option>
      <option value="Media / press">Media / press</option>
      <option value="Other">Other</option>
    </select>
  </div>
  <div class="form-field">
    <label for="message">Message</label>
    <textarea id="message" name="message" placeholder="What's on your mind?" required></textarea>
  </div>
  <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">
  <input type="hidden" name="_subject" value="New enquiry from siremammat.neocities.org">
  <button type="submit" class="btn-primary">Send Message →</button>
  <div class="success-msg">✓ Message sent! I'll get back to you within 48 hours.</div>
  <div class="error-msg">Something went wrong. Please email me directly at siremammat@gmail.com</div>
</form>
</body>
</html>
