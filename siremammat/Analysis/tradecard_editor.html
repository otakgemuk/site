<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Mono:wght@300;400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Card Editor — SIRE MAMMAT</title>
<style>
/* ═══════════════════════════════════════
   VARIABLES & RESET
═══════════════════════════════════════ */
:root{
  --dark:#0E0A04;--dark2:#16100A;--dark3:#1E1508;--dark4:#2C2010;
  --gold:#B87333;--gold-lt:#E8C46A;--gold-dim:#6B4420;
  --cream:#F5EDD8;--cream2:#EDE0C4;--muted:#8C7355;--muted2:#5C4A35;
  --green:#4A8A65;--red:#B04030;--blue:#6B8EC4;--orange:#C8854A;
  --font-display:'EB Garamond',Georgia,serif;
  --font-body:'Libre Baskerville',Georgia,serif;
  --font-mono:'DM Mono','Courier New',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:var(--dark);
  font-family:'DM Sans',sans-serif;
  color:var(--cream);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* ═══════════════════════════════════════
   TOP TOOLBAR
═══════════════════════════════════════ */
.toolbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;
  background:var(--surface);
  border-bottom:1px solid var(--dark4);
  flex-shrink:0;
  z-index:100;
  gap:12px;
  flex-wrap:wrap;
}
.toolbar-brand{
  display:flex;align-items:center;gap:12px;
}
.toolbar-brand .logo{
  font-family:var(--font-display);
  font-size:22px;letter-spacing:0.06em;color:var(--green);
}
.toolbar-brand .version{
  font-family:'Space Mono',monospace;
  font-size:9px;color:var(--muted);letter-spacing:0.15em;
  background:var(--surface2);border:1px solid var(--dark4);
  padding:2px 7px;border-radius:3px;
}
.toolbar-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end;}

.btn{
  font-family:'Space Mono',monospace;font-size:10px;letter-spacing:0.08em;
  padding:7px 12px;border-radius:5px;cursor:pointer;border:1px solid;
  transition:all 0.15s;display:inline-flex;align-items:center;gap:5px;
  text-transform:uppercase;white-space:nowrap;
}
.btn-ghost{background:transparent;border-color:var(--dark4);color:var(--muted);}
.btn-ghost:hover{border-color:rgba(184,115,51,0.2);color:var(--cream);background:var(--surface2);}
.btn-green{background:var(--green-dim);border-color:rgba(34,200,122,0.3);color:var(--green);}
.btn-green:hover{background:rgba(34,200,122,0.18);}
.btn-gold{background:var(--gold-dim);border-color:rgba(245,200,66,0.3);color:var(--gold);}
.btn-gold:hover{background:rgba(245,200,66,0.18);}
.btn-blue{background:var(--blue-dim);border-color:rgba(59,130,246,0.3);color:var(--blue);}
.btn-blue:hover{background:rgba(59,130,246,0.18);}

/* ═══════════════════════════════════════
   MAIN LAYOUT — SPLIT PANE
═══════════════════════════════════════ */
.workspace{
  display:grid;
  grid-template-columns:400px 1fr;
  flex:1;
  overflow:hidden;
}

/* ═══════════════════════════════════════
   LEFT PANEL — EDITOR
═══════════════════════════════════════ */
.editor-panel{
  background:var(--surface);
  border-right:1px solid var(--dark4);
  overflow-y:auto;
  display:flex;flex-direction:column;
}
.editor-panel::-webkit-scrollbar{width:4px;}
.editor-panel::-webkit-scrollbar-track{background:var(--dark);}
.editor-panel::-webkit-scrollbar-thumb{background:rgba(184,115,51,0.2);border-radius:2px;}

.section-head{
  padding:12px 18px 10px;
  border-bottom:1px solid var(--dark4);
  font-family:'Space Mono',monospace;font-size:9px;
  letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);
  background:var(--surface2);
  display:flex;align-items:center;gap:8px;
  position:sticky;top:0;z-index:10;
}
.section-head .dot{width:5px;height:5px;border-radius:50%;background:var(--gold);}

.form-body{padding:16px 18px;display:flex;flex-direction:column;gap:12px;}

label{
  font-family:'Space Mono',monospace;font-size:9px;
  color:var(--muted);text-transform:uppercase;letter-spacing:0.12em;
  display:block;margin-bottom:4px;
}
input[type=text],input[type=date],select,textarea{
  width:100%;background:var(--surface2);border:1px solid var(--dark4);
  border-radius:5px;color:var(--cream);font-family:'DM Sans',sans-serif;font-size:12px;
  padding:8px 10px;outline:none;transition:border-color 0.15s;
}
input[type=text]:focus,input[type=date]:focus,select:focus,textarea:focus{
  border-color:var(--blue);
}
textarea{resize:vertical;min-height:70px;line-height:1.6;}
select option{background:var(--surface2);}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}

.trade-block{
  border:1px solid var(--dark4);border-radius:8px;overflow:hidden;
  margin-bottom:4px;
}
.trade-block-head{
  padding:10px 14px;background:var(--surface2);
  border-bottom:1px solid var(--dark4);
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;user-select:none;
}
.trade-block-head .t-label{
  font-family:var(--font-display);font-size:18px;letter-spacing:0.05em;
}
.trade-block-head .t-label.long{color:var(--green);}
.trade-block-head .t-label.short{color:var(--red);}
.trade-block-head .chevron{color:var(--muted);font-size:12px;transition:transform 0.2s;}
.trade-block-head.collapsed .chevron{transform:rotate(-90deg);}
.trade-block-body{padding:14px;display:flex;flex-direction:column;gap:10px;}
.trade-block-body.hidden{display:none;}

.remove-trade-btn{
  font-family:'Space Mono',monospace;font-size:9px;
  color:var(--red);background:var(--red-dim);border:1px solid rgba(232,57,74,0.2);
  border-radius:3px;padding:2px 8px;cursor:pointer;
}
.add-trade-btn{
  margin:0 18px 16px;
  font-family:'Space Mono',monospace;font-size:10px;
  color:var(--muted);background:var(--surface2);border:1px dashed rgba(184,115,51,0.2);
  border-radius:5px;padding:9px;cursor:pointer;text-align:center;
  transition:all 0.15s;letter-spacing:0.1em;
}
.add-trade-btn:hover{border-color:var(--green);color:var(--green);}

/* chart upload */
.chart-upload-area{
  border:2px dashed rgba(184,115,51,0.2);border-radius:8px;
  padding:20px;text-align:center;cursor:pointer;transition:all 0.2s;
  background:var(--surface2);
}
.chart-upload-area:hover{border-color:var(--blue);background:var(--blue-dim);}
.chart-upload-area .upload-icon{font-size:24px;margin-bottom:6px;}
.chart-upload-area p{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0.1em;}
.chart-upload-area.has-img{border-color:var(--green);background:var(--green-dim);}
.chart-upload-area.has-img p{color:var(--green);}
#chart-file{display:none;}

/* ═══════════════════════════════════════
   RIGHT PANEL — PREVIEW
═══════════════════════════════════════ */
.preview-panel{
  overflow-y:auto;
  background:var(--dark);
}
.preview-panel::-webkit-scrollbar{width:4px;}
.preview-panel::-webkit-scrollbar-track{background:var(--dark);}
.preview-panel::-webkit-scrollbar-thumb{background:rgba(184,115,51,0.2);border-radius:2px;}

/* ═══════════════════════════════════════
   TRADE CARD PREVIEW STYLES
═══════════════════════════════════════ */
#preview-root{
  padding:32px 24px 48px;
  background-image:
    radial-gradient(ellipse 80% 40% at 50% -10%, rgba(59,130,246,0.06) 0%, transparent 70%),
    repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,0.015) 40px),
    repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,0.015) 40px);
  min-height:100%;
}

/* header */
#preview-root header{text-align:center;margin-bottom:32px;}
.p-session-label{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:0.18em;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
.p-h1{font-family:var(--font-display);font-size:clamp(32px,5vw,56px);letter-spacing:0.06em;line-height:1;}
.p-h1 span{color:var(--green);}
.p-subtitle{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:0.13em;margin-top:8px;}

/* context */
.p-section-label{
  font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.18em;
  text-transform:uppercase;color:var(--muted);
  display:flex;align-items:center;gap:10px;margin-bottom:12px;
}
.p-section-label::after{content:'';flex:1;height:1px;background:var(--dark4);}

.p-context{
  background:var(--surface);border:1px solid var(--dark4);border-radius:10px;
  overflow:hidden;margin-bottom:28px;
}
.p-ctx-header{
  padding:12px 20px;border-bottom:1px solid var(--dark4);
  display:flex;align-items:center;gap:8px;background:var(--surface2);
}
.p-ctx-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);box-shadow:0 0 6px var(--gold);}
.p-ctx-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;}
.p-ctx-body{display:grid;grid-template-columns:1fr 1fr;}
.p-chart-pane{background:#080b0e;border-right:1px solid var(--dark4);position:relative;min-height:200px;display:flex;align-items:center;justify-content:center;}
.p-chart-pane img{width:100%;height:100%;object-fit:cover;display:block;opacity:0.9;}
.p-no-chart{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted2);letter-spacing:0.1em;}
.p-narrative{padding:18px 20px;display:flex;flex-direction:column;gap:10px;}
.p-bias-row{display:flex;gap:6px;flex-wrap:wrap;}
.p-chip{font-family:'Space Mono',monospace;font-size:9px;padding:3px 8px;border-radius:3px;border:1px solid;}
.p-chip.bearish{background:var(--red-dim);color:var(--red);border-color:rgba(232,57,74,0.3);}
.p-chip.range{background:var(--gold-dim);color:var(--gold);border-color:rgba(245,200,66,0.3);}
.p-chip.bullish{background:var(--green-dim);color:var(--green);border-color:rgba(34,200,122,0.3);}
.p-chip.neutral{background:var(--blue-dim);color:var(--blue);border-color:rgba(59,130,246,0.3);}
.p-narrative-text{font-size:11px;line-height:1.75;color:#8a94a6;}
.p-narrative-text strong{color:var(--cream);font-weight:500;}
.p-key-levels{background:var(--surface2);border:1px solid var(--dark4);border-radius:6px;padding:10px 12px;display:flex;flex-direction:column;gap:5px;}
.p-kl-row{display:flex;justify-content:space-between;}
.p-kl-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;}
.p-kl-val{font-family:'Space Mono',monospace;font-size:9px;color:var(--cream);}

/* cards grid */
.p-cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;margin-bottom:28px;}
.p-card{
  background:var(--surface);border:1px solid var(--dark4);border-radius:10px;
  overflow:hidden;position:relative;
}
.p-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.p-card.long-c::before{background:var(--green);}
.p-card.short-c::before{background:var(--red);}
.p-card-head{padding:16px 18px 12px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid var(--dark4);}
.p-tid{font-family:var(--font-display);font-size:30px;letter-spacing:0.05em;line-height:1;}
.p-tid.long{color:var(--green);}
.p-tid.short{color:var(--red);}
.p-ttype{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.p-dir{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;padding:3px 8px;border-radius:3px;}
.p-dir.long{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,200,122,0.3);}
.p-dir.short{background:var(--red-dim);color:var(--red);border:1px solid rgba(232,57,74,0.3);}
.p-setup{font-size:9px;color:var(--muted);font-family:'Space Mono',monospace;}
.p-risk{font-family:'Space Mono',monospace;font-size:8px;padding:2px 6px;border-radius:3px;}
.p-risk.high{background:var(--red-dim);color:var(--red);border:1px solid rgba(232,57,74,0.2);}
.p-risk.med{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(245,200,66,0.2);}
.p-risk.low{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,200,122,0.2);}

.p-stats{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--dark4);}
.p-stat{padding:12px 14px;border-right:1px solid var(--dark4);}
.p-stat:last-child{border-right:none;}
.p-stat-label{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;}
.p-stat-value{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;}
.p-stat-value.green{color:var(--green);}
.p-stat-value.gold{color:var(--gold);}

.p-exec{padding:12px 18px;border-bottom:1px solid var(--dark4);}
.p-block-title{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;}
.p-erow{display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px;}
.p-ekey{color:var(--muted);}
.p-eval{font-family:'Space Mono',monospace;color:var(--cream);font-size:11px;}
.p-eval.red{color:var(--red);}
.p-eval.green{color:var(--green);}

.p-bar{margin:0 18px 12px;height:5px;border-radius:3px;background:var(--surface2);}
.p-bar-fill{height:100%;border-radius:3px;}
.p-bar-fill.long{background:linear-gradient(90deg,var(--blue),var(--green));}
.p-bar-fill.short{background:linear-gradient(90deg,var(--blue),var(--red));}

.p-note{
  margin:0 18px 10px;padding:9px 12px;border-radius:5px;
  border-left:3px solid var(--gold);background:var(--gold-dim);
  font-size:10px;color:#b8a060;line-height:1.6;
  font-family:'Space Mono',monospace;
}
.p-rationale{padding:10px 18px 14px;}
.p-rationale p{font-size:11px;line-height:1.75;color:#8a94a6;}
.p-rationale strong{color:var(--cream);font-weight:500;}
.p-tags{padding:0 18px 14px;display:flex;flex-wrap:wrap;gap:5px;}
.p-tag{font-family:'Space Mono',monospace;font-size:8px;padding:2px 7px;border-radius:3px;border:1px solid var(--dark4);color:var(--muted);background:var(--surface2);}
.p-tag.gold{border-color:rgba(245,200,66,0.3);color:var(--gold);background:var(--gold-dim);}
.p-tag.red{border-color:rgba(232,57,74,0.3);color:var(--red);background:var(--red-dim);}

/* summary */
.p-summary{
  background:var(--surface);border:1px solid var(--dark4);border-radius:10px;
  padding:22px 28px;display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:20px;
  margin-bottom:24px;
}
.p-sum-item{text-align:center;}
.p-sum-label{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
.p-sum-value{font-family:var(--font-display);font-size:30px;line-height:1;}
.p-sum-sub{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);margin-top:3px;}

.p-footer{text-align:center;font-family:'Space Mono',monospace;font-size:8px;color:#2e3540;letter-spacing:0.18em;text-transform:uppercase;}

/* ═══════════════════════════════════════
   PRINT / PDF STYLES
═══════════════════════════════════════ */
@media print{
  body{overflow:visible !important;background:#0a0c0f !important;}
  .toolbar,.editor-panel{display:none !important;}
  .workspace{display:block !important;}
  .preview-panel{overflow:visible !important;height:auto !important;}
  #preview-root{padding:20px !important;}
  .p-cards-grid{grid-template-columns:repeat(3,1fr) !important;}
  .p-ctx-body{grid-template-columns:1fr 1fr !important;}
  * {-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;}
}
</style>
</head>
<body>

<!-- ════════ TOOLBAR ════════ -->
<div class="toolbar">
  <div class="toolbar-brand">
    <div class="logo">TC Editor</div>
    <div class="version">v2.0 · SIRE MAMMAT</div>
  </div>
  <div class="toolbar-actions">
    <button class="btn btn-ghost" onclick="resetForm()">↺ Reset</button>
    <button class="btn btn-blue" onclick="addTrade()">+ Add Trade</button>
    <button class="btn btn-green" onclick="saveHTML()">⬇ Save Card</button>
    <button class="btn btn-gold" onclick="savePDF()">⬇ PDF</button>
    <button class="btn btn-ghost" id="manifest-btn" onclick="copyManifest()" style="border-color:rgba(34,200,122,0.25);color:#4A8A65;" title="Copy manifest entry for index.json">📋 Copy Manifest</button>
  </div>
</div>

<!-- ════════ WORKSPACE ════════ -->
<div class="workspace">

  <!-- ──────── LEFT: EDITOR ──────── -->
  <div class="editor-panel" id="editor-panel">

    <!-- SESSION INFO -->
    <div class="section-head"><div class="dot"></div>Session Info</div>
    <div class="form-body">
      <div>
        <label>Date</label>
        <input type="date" id="f-date" oninput="render()">
      </div>
      <div class="form-row">
        <div>
          <label>Instrument</label>
          <input type="text" id="f-instrument" value="MNQ Futures" oninput="render()">
        </div>
        <div>
          <label>Session</label>
          <input type="text" id="f-session" value="RTH Session" oninput="render()">
        </div>
      </div>
      <div>
        <label>Strategy / Title</label>
        <input type="text" id="f-strategy" value="TREND FROM OPEN" oninput="render()">
      </div>
      <div>
        <label>Author</label>
        <input type="text" id="f-author" value="SIRE MAMMAT" oninput="render()">
      </div>
    </div>

    <!-- CHART UPLOAD -->
    <div class="section-head"><div class="dot"></div>Chart Image</div>
    <div class="form-body">
      <div class="chart-upload-area" id="chart-drop" onclick="document.getElementById('chart-file').click()">
        <div class="upload-icon">📈</div>
        <p id="chart-label">CLICK TO UPLOAD EOD CHART</p>
        <p style="margin-top:4px;font-size:8px;opacity:0.6">PNG / JPG / WEBP</p>
      </div>
      <input type="file" id="chart-file" accept="image/*" onchange="handleChart(event)">
      <button class="btn btn-ghost" style="font-size:9px;" onclick="clearChart()">✕ Remove Chart</button>
    </div>

    <!-- CONTEXT / MARKET NARRATIVE -->
    <div class="section-head"><div class="dot"></div>Market Context</div>
    <div class="form-body">
      <div>
        <label>Session Bias Tags (comma-separated)</label>
        <input type="text" id="f-bias-tags" value="BEARISH OPEN, TRADING RANGE, LIMIT ORDER MARKET" oninput="render()" placeholder="e.g. BULLISH, TREND DAY, BREAKOUT">
      </div>
      <div>
        <label>Context Narrative</label>
        <textarea id="f-context-text" rows="5" oninput="render()" placeholder="Describe the session structure, key observations, bar-by-bar context..."></textarea>
      </div>
      <div>
        <label>Key Levels (one per line, format: Label | Value)</label>
        <textarea id="f-key-levels" rows="5" oninput="render()" placeholder="Session Bias | BEARISH → RANGE&#10;TD9 Exhaustion | Bar 9 (Red)&#10;Key Range Low | Bar 16&#10;Key Range High | Bar 23"></textarea>
      </div>
    </div>

    <!-- TRADES -->
    <div class="section-head"><div class="dot"></div>Trades</div>
    <div id="trades-container"></div>
    <div class="add-trade-btn" onclick="addTrade()">+ ADD TRADE</div>

    <!-- SUMMARY OVERRIDES -->
    <div class="section-head"><div class="dot"></div>Session Summary</div>
    <div class="form-body" style="padding-bottom:24px;">
      <div>
        <label>Session Bias Label</label>
        <input type="text" id="f-sum-bias" value="BEAR → RANGE" oninput="render()">
      </div>
      <div>
        <label>Footer Motto</label>
        <input type="text" id="f-motto" value="PATIENCE · DISCIPLINE · FEARLESS · EXECUTION" oninput="render()">
      </div>
    </div>

  </div><!-- /editor-panel -->

  <!-- ──────── RIGHT: PREVIEW ──────── -->
  <div class="preview-panel">
    <div id="preview-root"></div>
  </div>

</div><!-- /workspace -->

<script>
/* ═══════════════════════════════════
   STATE
═══════════════════════════════════ */
let chartDataUrl = null;
let tradeCount = 0;
let trades = []; // array of {id, fields}

/* ═══════════════════════════════════
   INIT
═══════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  // Set today's date
  const today = new Date();
  document.getElementById('f-date').value = today.toISOString().slice(0,10);

  // Default context
  document.getElementById('f-context-text').value =

/* ═══════════════════════════════════
   CHART HANDLING
═══════════════════════════════════ */
function handleChart(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    chartDataUrl = ev.target.result;
    document.getElementById('chart-label').textContent = '✓ ' + file.name;
    document.getElementById('chart-drop').classList.add('has-img');
    render();
  };
  reader.readAsDataURL(file);
}
function clearChart(){
  chartDataUrl = null;
  document.getElementById('chart-label').textContent = 'CLICK TO UPLOAD EOD CHART';
  document.getElementById('chart-drop').classList.remove('has-img');
  document.getElementById('chart-file').value='';
  render();
}

function removeTrade(id){
  trades = trades.filter(t => t.id !== id);
  document.getElementById(`trade-block-${id}`).remove();
  render();
}

function toggleTrade(id){
  const head = document.querySelector(`#trade-block-${id} .trade-block-head`);
  const body = document.getElementById(`trade-body-${id}`);
  head.classList.toggle('collapsed');
  body.classList.toggle('hidden');
}

function updateTradeLabel(id){
  const dir = document.getElementById(`t${id}-direction`).value;
  const label = document.getElementById(`trade-head-label-${id}`);
  label.textContent = `T${String(id).padStart(2,'0')} · ${dir.toUpperCase()}`;
  label.className = `t-label ${dir}`;
}

/* ═══════════════════════════════════
   HELPERS
═══════════════════════════════════ */
function v(id){ const el=document.getElementById(id); return el ? el.value : ''; }

function formatDate(str){
  if(!str) return '';
  const d = new Date(str + 'T00:00:00');
  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} '${String(d.getFullYear()).slice(2)}`;
}

function parseTags(str){
  return str.split(',').map(t=>t.trim()).filter(Boolean);
}

function parseBiasTags(str){
  return str.split(',').map(t=>t.trim()).filter(Boolean);
}

function biasBadgeClass(tag){
  const t = tag.toUpperCase();
  if(t.includes('BEAR')||t.includes('SHORT')||t.includes('DOWN')) return 'bearish';
  if(t.includes('BULL')||t.includes('LONG')||t.includes('UP')) return 'bullish';
  if(t.includes('RANGE')||t.includes('LIMIT')) return 'range';
  return 'neutral';
}

function calcSummary(){
  let total = 0;
  let wins = 0;
  const ids = getTradeIds();
  ids.forEach(id => {
    const pnl = parseFloat(v(`t${id}-pnl`)) || 0;
    if(pnl > 0) wins++;
    total += pnl;
  });
  const cnt = ids.length;
  const winRate = cnt > 0 ? Math.round((wins/cnt)*100) : 0;
  return {total, wins, cnt, winRate};
}

function getTradeIds(){
  // get IDs in DOM order
  return Array.from(document.querySelectorAll('.trade-block'))
    .map(el => parseInt(el.id.replace('trade-block-','')));
}

function barWidth(pnl){
  const p = parseFloat(pnl) || 0;
  const maxTick = 800;
  return Math.min(Math.abs(p)/maxTick*100, 100);
}

  const motto     = v('f-motto');

    ? `<img src="${chartDataUrl}" alt="EOD Chart">`

    const tNum     = String(idx+1).padStart(2,'0');

    const noteHTML = note ? `<div class="p-note">${note}</div>` : '';

    // tag rendering — first 2 as gold, rest normal
    const tagsHTML = tagsArr.map((t,i)=>`<span class="p-tag ${i<2?'gold':''}">${t}</span>`).join('');

    return `

        <div class="p-tid ${dirClass}">T${tNum}</div>
        <div class="p-ttype">

      <div class="p-stats">

          <div class="p-stat-value green">${pnlNum>0?'+':''}${pnl}</div>
        </div>
        <div class="p-stat">
          <div class="p-stat-label">R:R</div>
          <div class="p-stat-value gold">${rr}</div>
        </div>
        <div class="p-stat">
          <div class="p-stat-label">Result</div>
          <div class="p-stat-value green">${pnlNum>=0?'WIN ✓':'LOSS ✗'}</div>
        </div>
      </div>
      <div class="p-exec">
        <div class="p-block-title">Execution</div>
        <div class="p-erow"><span class="p-ekey">Order Type</span><span class="p-eval ${isLong?'green':'red'}">${orderType}</span></div>
        <div class="p-erow"><span class="p-ekey">Entry Trigger</span><span class="p-eval">${entry}</span></div>

        <div class="p-erow"><span class="p-ekey">Exit</span><span class="p-eval">${exit}</span></div>
      </div>

      <div class="p-rationale"><p>${rationale}</p></div>
      <div class="p-tags">${tagsHTML}</div>
    </div>`;
  }).join('');

  // avg rr — rough calc from pnl
  const avgRR = cnt > 0 ? (total/cnt).toFixed(0) : 0;

  const html = `
    <header>
      <div class="p-session-label">${session} · ${instrument} · EOD Review</div>

      </div>
      <div class="p-sum-item">

        <div class="p-sum-value" style="color:white">${cnt}</div>

      </div>
      <div class="p-sum-item">

  document.getElementById('preview-root').innerHTML = html;

/* ═══════════════════════════════════
   COPY MANIFEST ENTRY
═══════════════════════════════════ */
function copyManifest(){
  const dateStr = v('f-date') || new Date().toISOString().slice(0,10);
  const instrument = v('f-instrument');
  const strategy = v('f-strategy');
  const biasTags = parseBiasTags(v('f-bias-tags'));
  const {total, wins, cnt, winRate} = calcSummary();

  // Determine session result
  let result = 'MIXED';
  if (cnt > 0 && wins === cnt) result = 'WIN';
  else if (cnt > 0 && wins === 0) result = 'LOSS';

  // Build title from strategy or bias
  const title = strategy || (biasTags[0] || 'EOD Review') + ' — ' + instrument;

  const entry = {
    date: dateStr,
    title: title,
    instrument: instrument,
    strategy: strategy,
    trades: cnt,
    netPts: total,
    winRate: winRate,
    bias: biasTags.join(', ') || 'NEUTRAL',
    result: result,
    url: 'cards/' + dateStr + '.html'
  };

  const json = JSON.stringify(entry, null, 2);

  // Copy to clipboard
  navigator.clipboard.writeText(json).then(() => {
    const btn = document.getElementById('manifest-btn');
    btn.textContent = '✓ Copied!';
    btn.style.borderColor = 'rgba(34,200,122,0.5)';
    setTimeout(() => {
      btn.textContent = '📋 Manifest';
      btn.style.borderColor = 'rgba(34,200,122,0.3)';
    }, 2000);
  }).catch(() => {
    // Fallback: show in prompt
    prompt('Copy this JSON entry and add it to cards/index.json:', json);
  });
}
